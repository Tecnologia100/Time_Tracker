<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HorasTrack - Registro de Horas</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="gradient-text">HorasTrack</h1>
            <p>Tu tiempo, bajo control.</p>
        </header>

        <main class="dashboard">
            <section class="form-section glass-panel">
                <h2>Registrar Horas</h2>
                <form id="recordForm">
                    <div class="input-group">
                        <label for="date">Fecha</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="time-inputs-row">
                        <div class="input-group">
                            <label for="startTime">Hora Inicio</label>
                            <input type="time" id="startTime" required>
                        </div>
                        <div class="input-group">
                            <label for="endTime">Hora Final</label>
                            <input type="time" id="endTime" required>
                        </div>
                    </div>
                    <div class="time-inputs-row" style="align-items: center;">
                        <div class="input-group">
                            <label for="breakTime">Descanso (Lunch)</label>
                            <select id="breakTime" required>
                                <option value="0">Sin descanso (0 min)</option>
                                <option value="0.5">30 min</option>
                                <option value="1">1 hora</option>
                                <option value="1.5">1.5 horas</option>
                                <option value="2">2 horas</option>
                            </select>
                        </div>
                        <div class="input-group" style="text-align: right;">
                            <p class="calculated-hours-text" style="margin: 0; padding-top: 10px;">Total: <span id="calculatedHours">0</span> horas</p>
                        </div>
                    </div>
                    <div class="time-inputs-row">
                        <div class="input-group">
                            <label for="hourlyRate">Tarifa x Hora (USD)</label>
                            <input type="number" id="hourlyRate" step="0.5" min="0" required placeholder="Ej. 15.50">
                        </div>
                        <div class="input-group">
                            <label for="status">Estado de Pago</label>
                            <select id="status" required>
                                <option value="pending">Pendiente</option>
                                <option value="paid">Pagado</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="supervisor">Supervisor de Turno</label>
                        <input type="text" id="supervisor" placeholder="Ej. John Doe o N/A">
                    </div>
                    <button type="submit" class="btn-primary">Guardar Registro</button>
                    <button type="button" id="clearBtn" class="btn-secondary" style="width: 100%; margin-top: 1rem; color: var(--danger); border-color: rgba(239, 68, 68, 0.3);">Limpiar Formulario</button>
                </form>
            </section>

            <section class="summary-section">
                <h2>Resumen Semanal</h2>
                
                <div class="week-selector">
                    <button id="prevWeek" class="btn-icon">&lt;</button>
                    <span id="currentWeekLabel">Semana Actual</span>
                    <button id="nextWeek" class="btn-icon">&gt;</button>
                </div>

                <div class="stats-grid">
                    <div class="stat-card glass-panel">
                        <h3>Total Generado</h3>
                        <p id="totalEarned" class="stat-value">$0</p>
                        <p id="totalHours" style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem;">0 horas</p>
                    </div>
                    <div class="stat-card glass-panel success">
                        <h3>Pagado</h3>
                        <p id="paidEarned" class="stat-value">$0</p>
                        <p id="paidHours" style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem;">0 horas</p>
                    </div>
                    <div class="stat-card glass-panel warning">
                        <h3>Pendiente</h3>
                        <p id="pendingEarned" class="stat-value">$0</p>
                        <p id="pendingHours" style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem;">0 horas</p>
                    </div>
                </div>

                <div class="records-list glass-panel">
                    <h3>Registros de la Semana</h3>
                    <ul id="recordsList">
                        <!-- Items will be generated by JS -->
                    </ul>
                </div>
                
                <div class="actions-panel">
                    <button id="exportBtn" class="btn-secondary">Exportar</button>
                    <button id="importBtn" class="btn-secondary" onclick="document.getElementById('importFile').click()">Importar</button>
                    <input type="file" id="importFile" style="display: none;" accept=".json">
                </div>
            </section>
        </main>
    </div>
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
